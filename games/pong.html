<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Pong</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#09090f;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;color:#e2e2f0;user-select:none}#score{font-size:1.4rem;font-weight:800;letter-spacing:.2em;color:#a78bfa;margin-bottom:16px}canvas{border:1px solid rgba(99,102,241,.25);border-radius:10px}#msg{margin-top:14px;color:#7b7b9d;font-size:.85rem}
</style></head><body>
<div id="score">0 : 0</div>
<canvas id="c" width="600" height="380"></canvas>
<div id="msg">W/S to move · Play to 7 · Press Space to start</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=600,H=380,PAD_W=12,PAD_H=70,BALL=10,SPD=4;
let py=H/2-PAD_H/2,ay=H/2-PAD_H/2,bx=W/2,by=H/2,vx=SPD,vy=(Math.random()*2-1)*3,sc=[0,0],running=false,keys={};
function draw(){ctx.fillStyle='#09090f';ctx.fillRect(0,0,W,H);ctx.setLineDash([8,8]);ctx.strokeStyle='rgba(99,102,241,.2)';ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
ctx.fillStyle='#6366f1';ctx.beginPath();ctx.roundRect(10,py,PAD_W,PAD_H,4);ctx.fill();
ctx.fillStyle='#8b5cf6';ctx.beginPath();ctx.roundRect(W-10-PAD_W,ay,PAD_W,PAD_H,4);ctx.fill();
ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(bx,by,BALL,0,Math.PI*2);ctx.fill();}
function aiMove(){const center=ay+PAD_H/2;const diff=by-center;ay+=Math.sign(diff)*Math.min(Math.abs(diff),3.5);ay=Math.max(0,Math.min(H-PAD_H,ay));}
function tick(){if(!running)return;
if(keys['w']||keys['W'])py=Math.max(0,py-6);if(keys['s']||keys['S'])py=Math.min(H-PAD_H,py+6);
aiMove();bx+=vx;by+=vy;
if(by-BALL<=0||by+BALL>=H)vy*=-1;
if(bx-BALL<=10+PAD_W&&by>=py&&by<=py+PAD_H){vx=Math.abs(vx)+.2;vy=(by-(py+PAD_H/2))/12;}
if(bx+BALL>=W-10-PAD_W&&by>=ay&&by<=ay+PAD_H){vx=-(Math.abs(vx)+.2);vy=(by-(ay+PAD_H/2))/12;}
if(bx<0){sc[1]++;reset();}if(bx>W){sc[0]++;reset();}
document.getElementById('score').textContent=sc[0]+' : '+sc[1];draw();}
function reset(){bx=W/2;by=H/2;vx=(Math.random()>0.5?1:-1)*SPD;vy=(Math.random()*2-1)*3;running=false;document.getElementById('msg').textContent=sc[0]>=7||sc[1]>=7?(sc[0]>=7?'You win! 🎉':'CPU wins!')+'  Space to restart':'Space to continue';if(sc[0]>=7||sc[1]>=7)sc=[0,0];}
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '){running=true;document.getElementById('msg').textContent='W/S to move';}if(['w','s','W','S',' '].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
draw();setInterval(tick,1000/60);
</script></body></html>
