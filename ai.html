<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI — Veil</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #060610;
      --surface:        #0e0e1e;
      --surface2:       #15152a;
      --border:         #1e1e38;
      --text:           #ecedf8;
      --muted:          #6264a0;
      --accent:         #6366f1;
      --accent-light:   #818cf8;
      --accent-lighter: #a5b4fc;
    }

    body {
      font-family: ui-rounded, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    .site-header {
      position: relative;
      z-index: 10;
      background: rgba(6, 6, 16, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .site-header-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }
    .site-logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .site-nav { display: flex; align-items: center; gap: 20px; }
    .site-nav-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }
    .site-nav-link:hover { color: var(--text); }

    /* ── Model picker (in header) ───────────────────────── */
    .model-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 10px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .model-select:focus { border-color: var(--accent); }

    /* ── Chat layout ─────────────────────────────────────── */
    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      min-height: 0;
      padding: 0 20px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 24px 0;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Empty state ─────────────────────────────────────── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      text-align: center;
      padding: 40px 0;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state-title { font-size: 18px; font-weight: 600; color: var(--text); opacity: 0.5; }
    .empty-state-sub { font-size: 13px; line-height: 1.55; max-width: 320px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .suggestion-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      font-family: inherit;
    }
    .suggestion-chip:hover { border-color: var(--accent); color: var(--accent-lighter); }

    /* ── Messages ────────────────────────────────────────── */
    .message { display: flex; gap: 10px; align-items: flex-start; }
    .message.user { flex-direction: row-reverse; }

    .message-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .message.ai .message-avatar { background: var(--surface2); border: 1px solid var(--border); }
    .message.user .message-avatar { background: var(--accent); }

    .message-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .message.ai .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }
    .message.user .message-bubble {
      background: var(--accent);
      color: #fff;
      border-top-right-radius: 4px;
    }

    .message-bubble p { margin-bottom: 10px; }
    .message-bubble p:last-child { margin-bottom: 0; }
    .message-bubble code {
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: ui-monospace, monospace;
      font-size: 12px;
    }
    .message-bubble pre {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .message-bubble pre code { background: none; padding: 0; font-size: 13px; }
    .message-bubble ul, .message-bubble ol { padding-left: 20px; margin: 8px 0; }
    .message-bubble li { margin-bottom: 4px; }
    .message-bubble strong { font-weight: 600; }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
      animation: typing-bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing-bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

    /* ── Input area ──────────────────────────────────────── */
    .input-area {
      flex-shrink: 0;
      padding: 16px 0 20px;
      border-top: 1px solid var(--border);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.15s;
    }
    .input-row:focus-within { border-color: var(--accent); }

    #chat-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 22px;
      max-height: 160px;
      line-height: 1.55;
    }
    #chat-input::placeholder { color: var(--muted); }

    .send-btn {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: filter 0.15s, opacity 0.15s;
    }
    .send-btn:hover:not(:disabled) { filter: brightness(1.12); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .input-hint {
      font-size: 11px;
      color: var(--border);
      text-align: center;
      margin-top: 8px;
    }

    /* ── Footer ─────────────────────────────────────────── */
    .site-footer {
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .site-footer-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
    }
    .site-footer-inner a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
    .site-footer-inner a:hover { color: var(--text); }
    .site-footer-sep { opacity: 0.4; }
  </style>
</head>
<body>

<!-- Header -->
<header class="site-header">
  <div class="site-header-inner">
    <a class="site-logo" href="./">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="4" y1="21" x2="28" y2="21" stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M8 26 L16 13 L24 26" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="site-logo-text">Veil</span>
    </a>
    <div class="header-right">
      <select class="model-select" id="model-select">
        <option value="llama-3.1-8b-instant">Llama 3.1 8B</option>
        <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
        <option value="gemma2-9b-it">Gemma 2 9B</option>
        <option value="mistral-saba-24b">Mistral 24B</option>
      </select>

        <a class="site-nav-link" href="./">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
          Launcher
        </a>
        <a class="site-nav-link" href="https://discord.gg/NScKEHkd6U" target="_blank" rel="noopener">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
          </svg>
          Discord
        </a>
      </nav>
    </div>
  </div>
</header>

<!-- Chat -->
<div class="chat-wrap">
  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent-lighter)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10a10 10 0 0 1-10-10C2 6.48 6.48 2 12 2z"/>
        <path d="M12 16v-4M12 8h.01"/>
      </svg>
      <div class="empty-state-title">Veil AI</div>
      <div class="empty-state-sub">Ask anything — homework help, explanations, code, ideas. Powered by Groq.</div>
      <div class="suggestions">
        <button class="suggestion-chip" data-prompt="Explain how proxies work in simple terms">How do proxies work?</button>
        <button class="suggestion-chip" data-prompt="Help me with my homework on the American Revolution">History homework help</button>
        <button class="suggestion-chip" data-prompt="Write a Python function to reverse a string">Python code help</button>
        <button class="suggestion-chip" data-prompt="What are some tips for studying more effectively?">Study tips</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="chat-input" placeholder="Ask anything…" rows="1"></textarea>
      <button class="send-btn" id="send-btn" disabled aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Powered by <a href="https://groq.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;text-underline-offset:2px;">Groq</a> · Free &amp; fast</div>
  </div>
</div>

<!-- Footer -->
<footer class="site-footer">
  <div class="site-footer-inner">
    <span>Powered by <a href="https://github.com/MercuryWorkshop/scramjet" target="_blank" rel="noopener">Scramjet</a></span>
    <span class="site-footer-sep">·</span>
    <a href="https://discord.gg/NScKEHkd6U" target="_blank" rel="noopener">Join Discord</a>
  </div>
</footer>

<script>
  const messagesEl  = document.getElementById("messages");
  const inputEl     = document.getElementById("chat-input");
  const sendBtn     = document.getElementById("send-btn");
  const emptyState  = document.getElementById("empty-state");
  const modelSelect = document.getElementById("model-select");

  const history = []; // { role, content }
  let isLoading = false;

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
    sendBtn.disabled = !inputEl.value.trim() || isLoading;
  });

  // Send on Enter (Shift+Enter = newline)
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener("click", send);

  // Suggestion chips
  document.querySelectorAll(".suggestion-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      inputEl.value = chip.dataset.prompt;
      inputEl.dispatchEvent(new Event("input"));
      send();
    });
  });

  function send() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    if (emptyState) emptyState.remove();

    addMessage("user", text);
    history.push({ role: "user", content: text });

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    isLoading = true;

    const typingEl = addTyping();

    const model = modelSelect.value;

    fetch("https://veilub.mooo.com/api/ai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: [
          { role: "system", content: "You are a helpful, friendly assistant built into Veil — a school web proxy. Keep responses clear and concise. Format using markdown where helpful." },
          ...history,
        ],
        model,
      }),
    })
      .then(r => r.json().then(d => ({ ok: r.ok, d })))
      .then(({ ok, d }) => {
        typingEl.remove();
        if (!ok) throw new Error(d.error || "Unknown error");
        const reply = d.content.trim();
        history.push({ role: "assistant", content: reply });
        addMessage("ai", reply);
      })
      .catch(err => {
        typingEl.remove();
        addMessage("ai", `Sorry, something went wrong: ${err.message}. Try again.`);
      })
      .finally(() => {
        isLoading = false;
        sendBtn.disabled = !inputEl.value.trim();
        inputEl.focus();
      });
  }

  function addMessage(role, content) {
    const msg = document.createElement("div");
    msg.className = `message ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "message-avatar";
    avatar.innerHTML = role === "ai"
      ? `<svg width="14" height="14" viewBox="0 0 32 32" fill="none"><line x1="4" y1="21" x2="28" y2="21" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/><path d="M8 26 L16 13 L24 26" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

    const bubble = document.createElement("div");
    bubble.className = "message-bubble";
    bubble.innerHTML = role === "ai" ? renderMarkdown(content) : escHtml(content).replace(/\n/g, "<br>");

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function addTyping() {
    const msg = document.createElement("div");
    msg.className = "message ai";
    msg.innerHTML = `
      <div class="message-avatar">
        <svg width="14" height="14" viewBox="0 0 32 32" fill="none"><line x1="4" y1="21" x2="28" y2="21" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/><path d="M8 26 L16 13 L24 26" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="message-bubble" style="padding:14px 16px;">
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>`;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  // Basic markdown renderer
  function renderMarkdown(text) {
    return escHtml(text)
      // code blocks
      .replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) => `<pre><code>${code.trim()}</code></pre>`)
      // inline code
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      // bold
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      // italic
      .replace(/\*(.+?)\*/g, "<em>$1</em>")
      // headers
      .replace(/^### (.+)$/gm, "<strong>$1</strong>")
      .replace(/^## (.+)$/gm, "<strong>$1</strong>")
      .replace(/^# (.+)$/gm, "<strong>$1</strong>")
      // unordered lists
      .replace(/^[•\-\*] (.+)$/gm, "<li>$1</li>")
      .replace(/(<li>.*<\/li>\n?)+/g, s => `<ul>${s}</ul>`)
      // ordered lists
      .replace(/^\d+\. (.+)$/gm, "<li>$1</li>")
      // line breaks → paragraphs
      .split(/\n{2,}/).map(p => {
        if (p.startsWith("<ul>") || p.startsWith("<pre>")) return p;
        return `<p>${p.replace(/\n/g, "<br>")}</p>`;
      }).join("");
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  inputEl.focus();
</script>
</body>
</html>
