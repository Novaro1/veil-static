<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veil</title>
  <link rel="icon" id="favicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <canvas id="stars"></canvas>

  <!-- Nav -->
  <nav id="nav">
    <div class="nav-inner">
      <span class="logo">VEIL</span>
      <div class="nav-center">
        <input type="text" id="search" placeholder="Search games..." autocomplete="off" />
      </div>
      <div class="nav-right">
        <button class="cloak-btn" id="cloakBtn" title="Tab Cloak">🎭</button>
        <a href="https://discord.gg/NScKEHkd6U" target="_blank" class="btn btn-sm">Discord</a>
      </div>
    </div>
  </nav>

  <!-- Cloak picker -->
  <div class="cloak-panel" id="cloakPanel" style="display:none">
    <div class="cloak-title">Tab Cloak</div>
    <div class="cloak-options" id="cloakOptions"></div>
  </div>

  <!-- Main -->
  <main>
    <div class="hero-mini">
      <h1>VEIL <span class="gradient-text">Games</span></h1>
      <p>Click any game to play. Press <kbd>Alt+X</kbd> to instantly close.</p>
    </div>

    <div class="game-grid" id="gameGrid"></div>

    <div class="no-results" id="noResults" style="display:none">No games found.</div>
  </main>

  <!-- About strip -->
  <section class="about-strip">
    <div class="about-inner">
      <div class="about-block">
        <span class="about-icon">🌐</span>
        <div>
          <strong>Full Proxy</strong>
          <p>Need more? Launch the full Veil proxy to access any site.</p>
          <a href="https://veilub.mooo.com" target="_blank" class="btn btn-sm btn-primary" style="margin-top:8px">Open Proxy</a>
        </div>
      </div>
      <div class="about-block">
        <span class="about-icon">⭐</span>
        <div>
          <strong>Ambassador Program</strong>
          <p>Advertise Veil and unlock exclusive themes, cloaks &amp; early access.</p>
          <a href="https://discord.gg/NScKEHkd6U" target="_blank" class="btn btn-sm" style="margin-top:8px">Learn more</a>
        </div>
      </div>
    </div>
  </section>

  <!-- Game iframe overlay -->
  <div class="game-overlay" id="gameOverlay">
    <div class="game-bar">
      <span class="game-bar-title" id="gameBarTitle">Game</span>
      <div class="game-bar-actions">
        <button id="fullscreenBtn" title="Fullscreen">⛶</button>
        <button id="closeGame" title="Close">✕</button>
      </div>
    </div>
    <iframe id="gameFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups" allowfullscreen></iframe>
  </div>

  <script src="stars.js"></script>
  <script src="app.js"></script>
</body>
</html>
